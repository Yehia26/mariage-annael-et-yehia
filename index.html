<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariage Annaël &amp; Yehia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg" aria-hidden="true"></div>

<div class="hero">

  <div class="familles">
    <!-- Grands-parents côte à côte -->
    <div class="grands-parents">
      <div class="famille">
        <p>Mme Rachel Attias</p>
        <p>Mme Nicole Bouchara</p>
        <p>Mr Daniel Dahan</p>
      </div>
      <div class="famille famille--right">
        <p>Mme Danielle Lugassy</p>
        <p>Mme Stella Cohen</p>
      </div>
    </div>
    <!-- Parents sur une ligne -->
    <div class="parents">
      <span>M et Mme Karen et Henry Bouchara</span>
      <span class="parent--right">Mr et Mme Anne et Eric Cohen</span>
    </div>
  </div>

  <div class="hero-middle">
    <p class="invite">ont le plaisir de vous inviter<br>au mariage de</p>
    <h1 class="noms">Annaël &amp; Yehia</h1>
  </div>

  <div class="lieu">
    <p class="lieu-nom">Chateau de Roquefeuille</p>
    <p class="lieu-adresse">D6, 83910 Pourrières</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
